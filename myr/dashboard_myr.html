<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MYR·FX Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080c10;--panel:#0d1520;--border:#1a2d45;
  --accent:#00e5ff;--green:#00ff99;--amber:#ffb300;--red:#ff3d5a;
  --text:#c8dae8;--dim:#4a6580;
  --mono:'Share Tech Mono',monospace;--head:'Rajdhani',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999;}
 
/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:10000;transition:opacity .5s;}
.ld-logo{font-family:var(--head);font-size:3.5rem;font-weight:700;color:var(--accent);letter-spacing:10px;text-shadow:0 0 40px rgba(0,229,255,.5);}
.ld-bar{width:300px;height:1px;background:var(--border);overflow:hidden;}
.ld-prog{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));animation:ldprog 2.4s ease-in-out forwards;}
@keyframes ldprog{0%{width:0}100%{width:100%}}
.ld-msg{font-size:.6rem;color:var(--dim);letter-spacing:3px;animation:fpulse 1s ease-in-out infinite;}
@keyframes fpulse{0%,100%{opacity:.3}50%{opacity:1}}
 
/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 22px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,#080c10,#0a1420);height:52px;flex-shrink:0;}
.logo-badge{font-family:var(--head);font-size:1.5rem;font-weight:700;color:var(--accent);letter-spacing:4px;text-shadow:0 0 18px rgba(0,229,255,.5);}
.logo-sub{font-size:.5rem;color:var(--dim);letter-spacing:2px;}
#hstats{display:flex;gap:20px;}
.hst{text-align:center;}
.hst-v{font-size:.75rem;}
.hst-l{font-size:.48rem;color:var(--dim);letter-spacing:1px;}
.hdr-r{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
#liveDot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1.4s ease-in-out infinite;margin-right:5px;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#clock{font-size:.7rem;color:var(--accent);}
#cdown{font-size:.52rem;color:var(--dim);}
 
/* TICKER */
.ticker-wrap{overflow:hidden;background:#060a0e;border-bottom:1px solid var(--border);height:30px;display:flex;align-items:center;}
.ticker-inner{display:flex;animation:tickscroll 40s linear infinite;white-space:nowrap;}
@keyframes tickscroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk-item{display:inline-flex;align-items:center;gap:6px;padding:0 20px;font-size:.67rem;border-right:1px solid var(--border);}
.tk-code{color:var(--amber);}
.tk-chg{font-size:.59rem;}
.tk-chg.up{color:var(--green);}
.tk-chg.dn{color:var(--red);}
 
/* MAIN LAYOUT */
.layout{display:grid;grid-template-columns:232px 1fr;height:calc(100vh - 52px - 30px - 26px);}
 
/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;background:#080c10;overflow:hidden;}
.sb-head{font-size:.52rem;letter-spacing:3px;color:var(--dim);padding:12px 12px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-list{flex:1;overflow-y:auto;}
.c-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid rgba(26,45,69,.4);cursor:pointer;transition:background .15s;position:relative;}
.c-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--cc,var(--dim));opacity:0;transition:opacity .15s;}
.c-card.on::before{opacity:1;}
.c-card.on{background:rgba(13,21,32,.9);}
.c-card:hover{background:#0a1520;}
.c-chk{width:12px;height:12px;border:1px solid var(--cc,var(--dim));border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;transition:all .15s;}
.c-card.on .c-chk{background:var(--cc);color:#000;}
.c-info{flex:1;min-width:0;}
.c-code{font-size:.7rem;font-weight:bold;color:var(--cc,var(--text));}
.c-name{font-size:.52rem;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-data{text-align:right;flex-shrink:0;}
.c-rate{font-size:.67rem;}
.c-chg{font-size:.52rem;}
.c-chg.up{color:var(--green);}
.c-chg.dn{color:var(--red);}
 
/* WORKSPACE */
.workspace{display:flex;flex-direction:column;overflow:hidden;}
 
/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-bottom:1px solid var(--border);background:#080c10;height:38px;flex-shrink:0;}
.tl,.tr{display:flex;align-items:center;gap:5px;}
.ct-title{font-family:var(--head);font-size:.85rem;font-weight:500;color:var(--accent);letter-spacing:2px;margin-right:4px;}
.tbtn{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:var(--mono);font-size:.58rem;padding:4px 9px;cursor:pointer;letter-spacing:.5px;transition:all .15s;border-radius:2px;white-space:nowrap;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.04);}
.tbtn.on{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.07);}
.tbtn.sel-on{border-color:var(--amber);color:var(--amber);background:rgba(255,179,0,.07);}
.tbtn.dng{border-color:var(--red);color:var(--red);}
.tbtn.dng:hover{background:rgba(255,61,90,.07);}
.mode-pill{font-size:.5rem;padding:2px 8px;border-radius:10px;letter-spacing:1px;}
.mode-pill.pz{background:rgba(0,229,255,.1);color:var(--accent);border:1px solid rgba(0,229,255,.3);}
.mode-pill.sel{background:rgba(255,179,0,.1);color:var(--amber);border:1px solid rgba(255,179,0,.3);}
 
/* CHART CONTAINER */
.chart-cont{flex:1;position:relative;overflow:hidden;min-height:0;}
#cc{position:absolute;top:0;left:0;width:100%;height:100%;}
 
/* SELECTION OVERLAY */
#selOv{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:8;}
#selOv.active{pointer-events:auto;cursor:crosshair;}
#selBox{position:absolute;display:none;pointer-events:none;background:rgba(255,179,0,.06);}
#selLn1,#selLn2{position:absolute;display:none;top:0;bottom:0;width:1px;background:var(--amber);opacity:.65;pointer-events:none;}
 
/* SELECTION STATS */
#selStats{position:absolute;z-index:20;display:none;background:#0b1622;border:1px solid var(--border);padding:10px 14px;min-width:190px;max-width:250px;font-size:.62rem;line-height:1.9;box-shadow:0 4px 20px rgba(0,0,0,.6);pointer-events:none;}
.ssh{font-size:.5rem;color:var(--dim);letter-spacing:2px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.ssr{display:flex;align-items:center;gap:6px;margin-bottom:1px;}
.ssr-c{min-width:30px;font-weight:bold;font-size:.62rem;}
.ssr-n{flex:1;font-size:.58rem;color:var(--dim);}
.ssr-p{font-size:.62rem;min-width:68px;text-align:right;}
.ssr-p.up{color:var(--green);}
.ssr-p.dn{color:var(--red);}
 
/* NEWS OVERLAY */
#newsOv{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9;}
.nm{position:absolute;transform:translateX(-50%);pointer-events:auto;cursor:pointer;}
.nm:hover .nmf{transform:scale(1.4);}
.nmf{width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;transition:transform .15s;}
.nmf.pos{background:rgba(0,255,153,.15);border:1px solid var(--green);color:var(--green);}
.nmf.neg{background:rgba(255,61,90,.15);border:1px solid var(--red);color:var(--red);}
.nmf.neu{background:rgba(255,179,0,.15);border:1px solid var(--amber);color:var(--amber);}
.nm-st{width:1px;margin:0 auto;opacity:.25;}
 
/* RANGE BAR */
.range-bar{padding:7px 14px 8px;border-top:1px solid var(--border);background:#060a0e;flex-shrink:0;}
.rp-row{display:flex;gap:3px;margin-bottom:7px;}
.rp-btn{flex:1;background:transparent;border:1px solid var(--border);color:var(--dim);font-family:var(--mono);font-size:.56rem;padding:4px 0;cursor:pointer;transition:all .15s;}
.rp-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.06);}
.rp-btn:hover:not(.on){border-color:var(--dim);color:var(--text);}
.sl-row{display:flex;align-items:center;gap:10px;}
.sl-lbl{font-size:.52rem;color:var(--dim);white-space:nowrap;}
input[type=range].rdial{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:var(--border);outline:none;cursor:pointer;}
input[type=range].rdial::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(0,229,255,.5);border:2px solid #080c10;cursor:pointer;}
 
/* NEWS PANEL */
#newsPanel{position:fixed;top:0;right:-420px;bottom:0;width:400px;background:#0b1622;border-left:1px solid var(--border);transition:right .3s ease;z-index:500;display:flex;flex-direction:column;box-shadow:-6px 0 30px rgba(0,0,0,.6);}
#newsPanel.open{right:0;}
.nph{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.np-title{font-family:var(--head);font-size:.95rem;font-weight:500;color:var(--accent);letter-spacing:2px;}
.np-close{background:none;border:1px solid var(--border);color:var(--dim);font-family:var(--mono);font-size:.6rem;padding:4px 10px;cursor:pointer;}
.np-close:hover{border-color:var(--red);color:var(--red);}
.npb{flex:1;overflow-y:auto;padding:18px;}
.np-dt{font-size:.55rem;color:var(--dim);letter-spacing:1px;margin-bottom:8px;}
.np-sent{display:inline-flex;align-items:center;gap:5px;font-size:.58rem;padding:2px 9px;border-radius:2px;margin-bottom:10px;}
.np-sent.pos{background:rgba(0,255,153,.08);color:var(--green);border:1px solid rgba(0,255,153,.25);}
.np-sent.neg{background:rgba(255,61,90,.08);color:var(--red);border:1px solid rgba(255,61,90,.25);}
.np-sent.neu{background:rgba(255,179,0,.08);color:var(--amber);border:1px solid rgba(255,179,0,.25);}
.np-ttl{font-size:.82rem;line-height:1.55;color:var(--text);margin-bottom:11px;}
.np-desc{font-size:.65rem;color:var(--dim);line-height:1.75;margin-bottom:14px;}
.np-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.np-tag{font-size:.52rem;padding:2px 7px;border:1px solid var(--border);color:var(--dim);}
.np-tag.hit{border-color:var(--accent);color:var(--accent);}
.np-acts{display:flex;gap:8px;}
.np-btn{flex:1;padding:8px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:var(--mono);font-size:.62rem;cursor:pointer;transition:all .15s;}
.np-btn:hover{border-color:var(--accent);color:var(--accent);}
.np-btn.starred{color:var(--amber);border-color:var(--amber);}
.np-btn.go{border-color:var(--green);color:var(--green);}
 
/* STATUSBAR */
.statusbar{display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:26px;border-top:1px solid var(--border);background:#060a0e;font-size:.52rem;color:var(--dim);}
.sb-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green);margin-right:5px;}
 
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);}
</style>
</head>
<body>
 
<div id="loading">
  <div class="ld-logo">MYR·FX</div>
  <div class="ld-bar"><div class="ld-prog"></div></div>
  <div class="ld-msg" id="ldMsg">INITIALIZING...</div>
</div>
 
<header>
  <div>
    <div class="logo-badge">MYR·FX</div>
    <div class="logo-sub">RINGGIT EXCHANGE TERMINAL · LIVE</div>
  </div>
  <div id="hstats"></div>
  <div class="hdr-r">
    <div><span id="liveDot"></span><span id="clock">--:--:--</span></div>
    <div id="cdown">REFRESH IN --s</div>
  </div>
</header>
 
<div class="ticker-wrap"><div class="ticker-inner" id="ticker"></div></div>
 
<div class="layout">
  <aside class="sidebar">
    <div class="sb-head">CURRENCIES / MYR</div>
    <div class="sb-list" id="cList"></div>
  </aside>
 
  <div class="workspace">
    <div class="toolbar">
      <div class="tl">
        <span class="ct-title">1 UNIT → MYR</span>
        <span class="mode-pill pz" id="modePill">PAN · ZOOM</span>
        <button class="tbtn" id="btnSel">⊡ SELECT RANGE</button>
        <button class="tbtn on" id="btnNews">📰 NEWS</button>
      </div>
      <div class="tr">
        <button class="tbtn" id="btnZI">＋ ZOOM</button>
        <button class="tbtn" id="btnZO">－ ZOOM</button>
        <button class="tbtn dng" id="btnRst">↺ RESET VIEW</button>
      </div>
    </div>
 
    <div class="chart-cont" id="chartCont">
      <canvas id="cc"></canvas>
      <div id="selOv">
        <div id="selBox"></div>
        <div id="selLn1"></div>
        <div id="selLn2"></div>
      </div>
      <div id="selStats"><div class="ssh">RANGE ANALYSIS</div><div id="ssContent"></div></div>
      <div id="newsOv"></div>
    </div>
 
    <div class="range-bar">
      <div class="rp-row" id="rpRow"></div>
      <div class="sl-row">
        <span class="sl-lbl">◀ LIVE</span>
        <input type="range" class="rdial" id="rdial" min="0" max="8" step="1" value="3"/>
        <span class="sl-lbl">2 YEARS ▶</span>
      </div>
    </div>
  </div>
</div>
 
<div class="statusbar">
  <span><span class="sb-dot"></span>RATES: FAWAZAHMED0/ECB · INTRADAY: SIMULATED · NEWS: RSS FEEDS</span>
  <span id="sbUpd">UPDATED: --</span>
  <span>BASE: MYR · 6DP PRECISION · SCROLL=ZOOM · DRAG=PAN</span>
</div>
 
<div id="newsPanel">
  <div class="nph">
    <div class="np-title">NEWS EVENT</div>
    <button class="np-close" onclick="closeNews()">✕ CLOSE</button>
  </div>
  <div class="npb" id="npBody"></div>
</div>
 
<script>
// ─── CONSTANTS ───────────────────────────────────
const CUR = [
  {code:'USD',name:'US Dollar',         col:'#00e5ff',flag:'🇺🇸'},
  {code:'GBP',name:'British Pound',     col:'#a78bfa',flag:'🇬🇧'},
  {code:'EUR',name:'Euro',              col:'#f59e0b',flag:'🇪🇺'},
  {code:'CNY',name:'Chinese Yuan',      col:'#f87171',flag:'🇨🇳'},
  {code:'SGD',name:'Singapore Dollar',  col:'#34d399',flag:'🇸🇬'},
  {code:'AED',name:'UAE Dirham',        col:'#fb923c',flag:'🇦🇪'},
  {code:'JPY',name:'Japanese Yen',      col:'#e879f9',flag:'🇯🇵'},
  {code:'AUD',name:'Australian Dollar', col:'#4ade80',flag:'🇦🇺'},
  {code:'THB',name:'Thai Baht',         col:'#60a5fa',flag:'🇹🇭'},
  {code:'INR',name:'Indian Rupee',      col:'#fbbf24',flag:'🇮🇳'},
  {code:'KRW',name:'South Korean Won',  col:'#2dd4bf',flag:'🇰🇷'},
  {code:'HKD',name:'Hong Kong Dollar',  col:'#f472b6',flag:'🇭🇰'},
];
const RANGES = [
  {l:'LIVE',d:0},{l:'3D',d:3},{l:'1W',d:7},{l:'2W',d:14},
  {l:'1M',d:30},{l:'3M',d:90},{l:'6M',d:180},{l:'1Y',d:365},{l:'2Y',d:730},
];
const MYR_KW = ['ringgit','myr','forex','bank negara','malaysia economy','exchange rate',
  'malaysia trade','gdp malaysia','palm oil','oil malaysia','inflation malaysia',
  'fdi malaysia','interest rate malaysia','malaysia budget','currency malaysia','ringgit exchange'];
const POS_W = ['deal','growth','surplus','investment','expansion','record','upgrade','boost',
  'rally','gain','agreement','partnership','discovery','reserve','inflow'];
const NEG_W = ['deficit','debt','sanction','corruption','fraud','scandal','recession','crash',
  'plunge','downgrade','crisis','conflict','fall','decline','drop','loss'];
const RSS = [
  'https://www.theguardian.com/world/malaysia/rss',
  'https://www.freemalaysiatoday.com/feed/',
];
 
// ─── STATE ───────────────────────────────────────
let active   = new Set(['USD','GBP','EUR','CNY','SGD','AED','JPY']);
let hist     = {};
let latest   = {};
let prev     = {};
let ticks    = [];   // live sim ticks [{ts,rates}]
let chart    = null;
let ri       = 3;    // range index
let selMode  = false;
let newsVis  = true;
let news     = [];
let starred  = new Set(JSON.parse(localStorage.getItem('myr-st')||'[]'));
let rSec     = 60;
 
// ─── DATA ─────────────────────────────────────────
async function fetchDay(ds) {
  const lat = ds==='latest';
  const us = lat
    ? ['https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/myr.json',
       'https://latest.currency-api.pages.dev/v1/currencies/myr.json']
    : [`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${ds}/v1/currencies/myr.json`,
       `https://historical.currency-api.pages.dev/v1/${ds}/currencies/myr.json`];
  let data;
  for (const u of us) { try{const r=await fetch(u);if(r.ok){data=await r.json();break;}}catch{} }
  if (!data?.myr) return null;
  const res={};
  for (const c of CUR) { const k=c.code.toLowerCase(); if(data.myr[k]) res[c.code]=1/data.myr[k]; }
  return res;
}
 
function dayRange(n) {
  const arr=[];
  const now=new Date();
  for (let i=n;i>=1;i--) {
    const d=new Date(now); d.setDate(d.getDate()-i);
    arr.push(d.toISOString().split('T')[0]);
  }
  return arr;
}
 
async function loadHist(n) {
  const dates=dayRange(n);
  const miss=dates.filter(d=>!hist[d]);
  for (let i=0;i<miss.length;i+=6) {
    const b=miss.slice(i,i+6);
    const res=await Promise.all(b.map(d=>fetchDay(d)));
    b.forEach((d,j)=>{ if(res[j]) hist[d]=res[j]; });
  }
  return dates;
}
 
async function fetchLatest() {
  const data=await fetchDay('latest');
  if (!data) return;
  prev={...latest}; latest=data;
  hist[new Date().toISOString().split('T')[0]]=data;
  const tk={ts:Date.now(),rates:{...data}};
  if (!ticks.length) seedTicks(tk); else ticks.push(tk);
  if (ticks.length>600) ticks=ticks.slice(-600);
}
 
function seedTicks(base) {
  const N=150, IV=5000, seeds=[];
  for (let i=N;i>=1;i--) {
    const ts=base.ts-i*IV, rates={};
    for (const c of CUR) {
      const b=base.rates[c.code]||1;
      rates[c.code]=b+b*(Math.random()-.499)*0.0006*(i/N);
    }
    seeds.push({ts,rates});
  }
  ticks=[...seeds,base];
}
 
function simTick() {
  if (!ticks.length) return;
  const last=ticks[ticks.length-1], rates={};
  for (const c of CUR) {
    const v=last.rates[c.code]||1;
    rates[c.code]=v+v*(Math.random()-.499)*0.00016;
  }
  ticks.push({ts:Date.now(),rates});
  if (ticks.length>600) ticks.shift();
  latest={...rates};
}
 
// ─── NEWS ─────────────────────────────────────────
function relevant(t,d){ return MYR_KW.some(k=>(t+' '+d).toLowerCase().includes(k)); }
function sentiment(t,d){
  const tx=(t+' '+d).toLowerCase();
  const p=POS_W.filter(w=>tx.includes(w)).length;
  const n=NEG_W.filter(w=>tx.includes(w)).length;
  return p>n?'pos':n>p?'neg':'neu';
}
function matchKW(t,d){ return MYR_KW.filter(k=>(t+' '+d).toLowerCase().includes(k)); }
 
async function fetchNews() {
  const res=[];
  for (const rss of RSS) {
    try {
      const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}&count=25`);
      const data=await r.json();
      if (!data.items) continue;
      for (const item of data.items) {
        const t=item.title||'', d=(item.description||'').replace(/<[^>]*>/g,'').slice(0,350);
        if (!relevant(t,d)) continue;
        const pub=new Date(item.pubDate||item.published);
        if (isNaN(pub)) continue;
        res.push({id:item.guid||item.link,title:t,desc:d,url:item.link,
          date:pub.toISOString().split('T')[0],ts:pub.getTime(),
          sentiment:sentiment(t,d),kw:matchKW(t,d)});
      }
    } catch {}
  }
  const seen=new Set();
  news=res.filter(n=>{ if(seen.has(n.id)) return false; seen.add(n.id); return true; });
  renderNews();
}
 
function renderNews() {
  const ov=document.getElementById('newsOv');
  ov.innerHTML='';
  if (!chart||!newsVis||ri===0) return;
  const ca=chart.chartArea; if (!ca) return;
  const cutoff=Date.now()-RANGES[ri].d*86400000;
  for (const item of news) {
    if (item.ts<cutoff) continue;
    let px; try{px=chart.scales.x.getPixelForValue(item.ts);}catch{continue;}
    if (px<ca.left||px>ca.right) continue;
    const sh=Math.floor(Math.random()*18)+12;
    const clr=item.sentiment==='pos'?'var(--green)':item.sentiment==='neg'?'var(--red)':'var(--amber)';
    const el=document.createElement('div');
    el.className='nm';
    el.style.cssText=`left:${px}px;top:${ca.top+4}px;`;
    el.innerHTML=`<div class="nmf ${item.sentiment}" style="color:${clr}">${starred.has(item.id)?'★':'◆'}</div><div class="nm-st" style="height:${sh}px;background:${clr}"></div>`;
    el.title=item.title;
    el.addEventListener('click',()=>openNews(item));
    ov.appendChild(el);
  }
}
 
function openNews(item) {
  const isStar=starred.has(item.id);
  const sl=item.sentiment==='pos'?'▲ BULLISH MYR':item.sentiment==='neg'?'▼ BEARISH MYR':'◆ NEUTRAL';
  document.getElementById('npBody').innerHTML=`
    <div class="np-dt">${item.date}</div>
    <div class="np-sent ${item.sentiment}">${sl}</div>
    <div class="np-ttl">${item.title}</div>
    <div class="np-desc">${item.desc}</div>
    <div class="np-tags">${item.kw.map(k=>`<span class="np-tag hit">${k}</span>`).join('')}</div>
    <div class="np-acts">
      <button class="np-btn ${isStar?'starred':''}" id="npStar" onclick="toggleStar('${item.id}',this)">${isStar?'★ STARRED':'☆ STAR'}</button>
      <button class="np-btn go" onclick="window.open('${item.url}','_blank')">↗ READ</button>
    </div>`;
  document.getElementById('newsPanel').classList.add('open');
}
 
function closeNews(){ document.getElementById('newsPanel').classList.remove('open'); }
 
function toggleStar(id,btn){
  if (starred.has(id)){starred.delete(id);btn.textContent='☆ STAR';btn.classList.remove('starred');}
  else{starred.add(id);btn.textContent='★ STARRED';btn.classList.add('starred');}
  localStorage.setItem('myr-st',JSON.stringify([...starred]));
  renderNews();
}
 
// ─── CHART ────────────────────────────────────────
const newsPlugin={
  id:'newsPlugin',
  afterRender(){ renderNews(); }
};
 
function timeUnit(d){
  if(d===0) return 'minute';
  if(d<=3)  return 'hour';
  if(d<=90) return 'day';
  if(d<=365)return 'week';
  return 'month';
}
function timeFmt(d){
  if(d===0) return {minute:'HH:mm',hour:'HH:mm'};
  if(d<=3)  return {hour:'MM/dd HH:mm'};
  if(d<=90) return {day:'MM/dd'};
  if(d<=365)return {week:'MM/dd'};
  return {month:"MMM ''yy"};
}
 
function makeSets(labels,live){
  return CUR.filter(c=>active.has(c.code)).map(c=>({
    label:c.code,
    data:live
      ? ticks.map(t=>({x:t.ts,y:t.rates[c.code]??null}))
      : labels.map(d=>{ const r=hist[d]; return r?{x:new Date(d).getTime(),y:r[c.code]??null}:null; }).filter(Boolean),
    borderColor:c.col,
    backgroundColor:c.col+'10',
    borderWidth:1.6,
    pointRadius:live?0:2,
    pointHoverRadius:5,
    pointBackgroundColor:c.col,
    tension:0.3,
    fill:false,
  }));
}
 
async function buildChart(){
  const rng=RANGES[ri], live=rng.d===0;
  let labels=[];
  if (!live) labels=await loadHist(rng.d);
  if (chart){chart.destroy();chart=null;}
  const ctx=document.getElementById('cc').getContext('2d');
  chart=new Chart(ctx,{
    type:'line',
    data:{datasets:makeSets(labels,live)},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:{duration:200},
      parsing:false,
      plugins:{
        legend:{display:true,position:'top',labels:{color:'#4a6580',font:{family:"'Share Tech Mono',monospace",size:10},boxWidth:10,padding:14}},
        tooltip:{
          mode:'index',intersect:false,
          backgroundColor:'#0d1520',borderColor:'#1a2d45',borderWidth:1,
          titleColor:'#00e5ff',bodyColor:'#c8dae8',
          titleFont:{family:"'Share Tech Mono',monospace",size:10},
          bodyFont:{family:"'Share Tech Mono',monospace",size:10},
          padding:10,
          callbacks:{label:c=>` ${c.dataset.label}: ${(c.parsed.y||0).toFixed(6)} MYR`}
        },
        zoom:{
          zoom:{wheel:{enabled:true,speed:0.08},pinch:{enabled:true},mode:'x'},
          pan:{enabled:true,mode:'x'},
          limits:{x:{min:'original',max:'original'}},
        },
      },
      scales:{
        x:{type:'time',time:{unit:timeUnit(rng.d),displayFormats:timeFmt(rng.d)},
          grid:{color:'#0c1820'},ticks:{color:'#4a6580',font:{family:"'Share Tech Mono',monospace",size:9},maxTicksLimit:12},
          border:{color:'#1a2d45'}},
        y:{grid:{color:'#0c1820'},
          ticks:{color:'#4a6580',font:{family:"'Share Tech Mono',monospace",size:9},callback:v=>v.toFixed(4)},
          border:{color:'#1a2d45'}},
      },
    },
    plugins:[newsPlugin],
  });
}
 
function pushLiveTick(rates){
  if (!chart||ri!==0) return;
  const ts=Date.now();
  chart.data.datasets.forEach(ds=>{
    ds.data.push({x:ts,y:rates[ds.label]??null});
    if(ds.data.length>600) ds.data.shift();
  });
  chart.update('none');
}
 
// ─── SELECTION ────────────────────────────────────
let dragging=false, dx0=0, dx1=0;
const cont    = document.getElementById('chartCont');
const selOv   = document.getElementById('selOv');
const selBox  = document.getElementById('selBox');
const selLn1  = document.getElementById('selLn1');
const selLn2  = document.getElementById('selLn2');
const selSt   = document.getElementById('selStats');
 
selOv.addEventListener('mousedown',e=>{ if(!selMode||!chart) return; dragging=true; dx0=dx1=e.offsetX; selSt.style.display='none'; paintSel(); });
selOv.addEventListener('mousemove',e=>{ if(!dragging||!selMode) return; dx1=e.offsetX; paintSel(); });
selOv.addEventListener('mouseup',  e=>{ if(!dragging||!selMode) return; dragging=false; dx1=e.offsetX; paintSel(); calcStats(); });
selOv.addEventListener('mouseleave',()=>{ if(dragging&&selMode){dragging=false;calcStats();} });
 
function paintSel(){
  const x0=Math.min(dx0,dx1), x1=Math.max(dx0,dx1);
  const ca=chart?.chartArea; if(!ca) return;
  if(x1-x0<3){selBox.style.display=selLn1.style.display=selLn2.style.display='none';return;}
  const base=`position:absolute;top:${ca.top}px;height:${ca.bottom-ca.top}px;`;
  selBox.style.cssText=base+`left:${x0}px;width:${x1-x0}px;display:block;background:rgba(255,179,0,.06);pointer-events:none;`;
  selLn1.style.cssText=`position:absolute;top:${ca.top}px;left:${x0}px;height:${ca.bottom-ca.top}px;width:1px;background:var(--amber);opacity:.65;display:block;pointer-events:none;`;
  selLn2.style.cssText=`position:absolute;top:${ca.top}px;left:${x1}px;height:${ca.bottom-ca.top}px;width:1px;background:var(--amber);opacity:.65;display:block;pointer-events:none;`;
}
 
function calcStats(){
  if(!chart) return;
  const ca=chart.chartArea;
  const x0=Math.min(dx0,dx1), x1=Math.max(dx0,dx1);
  if(x1-x0<10) return;
  const cx0=Math.max(x0,ca.left), cx1=Math.min(x1,ca.right);
  let t0,t1; try{t0=chart.scales.x.getValueForPixel(cx0);t1=chart.scales.x.getValueForPixel(cx1);}catch{return;}
  const diff=((t1-t0)/86400000).toFixed(2);
  const fmt=t=>{const d=new Date(t);return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
  let rows='';
  for (const ds of chart.data.datasets){
    const pts=ds.data; let p0=null,p1=null,m0=Infinity,m1=Infinity;
    for(const pt of pts){if(!pt||pt.y==null)continue; const a=Math.abs(pt.x-t0);if(a<m0){m0=a;p0=pt;} const b=Math.abs(pt.x-t1);if(b<m1){m1=b;p1=pt;}}
    if(!p0||!p1) continue;
    const pct=(p1.y-p0.y)/p0.y*100;
    const sgn=pct>=0?'+':'', cls=pct>=0?'up':'dn';
    const c=CUR.find(c=>c.code===ds.label);
    rows+=`<div class="ssr"><span class="ssr-c" style="color:${c?.col}">${ds.label}</span><span class="ssr-n">${p0.y.toFixed(4)}→${p1.y.toFixed(4)}</span><span class="ssr-p ${cls}">${sgn}${pct.toFixed(4)}%</span></div>`;
  }
  document.getElementById('ssContent').innerHTML=`<div style="font-size:.5rem;color:var(--dim);margin-bottom:6px">${fmt(t0)} → ${fmt(t1)} (${diff}d)</div>${rows}`;
  const pw=210; let left=x1+10; if(left+pw>cont.clientWidth) left=x0-pw-10;
  selSt.style.cssText=`display:block;left:${Math.max(0,left)}px;top:${ca.top+10}px;`;
}
 
function clearSel(){
  selBox.style.display=selLn1.style.display=selLn2.style.display=selSt.style.display='none';
}
 
// ─── TOOLBAR ──────────────────────────────────────
document.getElementById('btnSel').addEventListener('click',()=>{
  selMode=!selMode;
  const btn=document.getElementById('btnSel'), pill=document.getElementById('modePill');
  btn.classList.toggle('sel-on',selMode);
  pill.className='mode-pill '+(selMode?'sel':'pz');
  pill.textContent=selMode?'SELECT MODE':'PAN · ZOOM';
  selOv.classList.toggle('active',selMode);
  if(!selMode) clearSel();
  if(chart){
    chart.options.plugins.zoom.zoom.wheel.enabled=!selMode;
    chart.options.plugins.zoom.pan.enabled=!selMode;
    chart.update('none');
  }
});
 
document.getElementById('btnNews').addEventListener('click',()=>{
  newsVis=!newsVis;
  document.getElementById('btnNews').classList.toggle('on',newsVis);
  renderNews();
});
 
document.getElementById('btnZI').addEventListener('click',()=>{if(chart)chart.zoom(1.35);});
document.getElementById('btnZO').addEventListener('click',()=>{if(chart)chart.zoom(0.74);});
document.getElementById('btnRst').addEventListener('click',()=>{if(chart)chart.resetZoom();clearSel();});
 
// ─── RANGE BAR ────────────────────────────────────
function buildRangebar(){
  const row=document.getElementById('rpRow'); row.innerHTML='';
  RANGES.forEach((r,i)=>{
    const b=document.createElement('button');
    b.className='rp-btn'+(i===ri?' on':'');
    b.textContent=r.l;
    b.addEventListener('click',()=>setRange(i));
    row.appendChild(b);
  });
  document.getElementById('rdial').value=ri;
}
 
function setRange(i){
  ri=i;
  document.querySelectorAll('.rp-btn').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.getElementById('rdial').value=i;
  clearSel();
  buildChart();
}
 
document.getElementById('rdial').addEventListener('input',e=>setRange(parseInt(e.target.value)));
 
// ─── SIDEBAR ──────────────────────────────────────
function buildSidebar(){
  const list=document.getElementById('cList'); list.innerHTML='';
  for (const c of CUR){
    const on=active.has(c.code), r=latest[c.code], p=prev[c.code];
    const chg=r&&p?(r-p)/p*100:0;
    const d=document.createElement('div');
    d.className='c-card'+(on?' on':'');
    d.style.setProperty('--cc',c.col);
    d.innerHTML=`<div class="c-chk">${on?'✓':''}</div><div class="c-info"><div class="c-code">${c.flag} ${c.code}</div><div class="c-name">${c.name}</div></div><div class="c-data"><div class="c-rate">${r?r.toFixed(6):'———'}</div><div class="c-chg ${chg>=0?'up':'dn'}">${r&&p?(chg>=0?'▲':'▼')+Math.abs(chg).toFixed(4)+'%':'—'}</div></div>`;
    d.addEventListener('click',()=>{
      if(active.has(c.code)) active.delete(c.code); else active.add(c.code);
      buildSidebar(); buildChart();
    });
    list.appendChild(d);
  }
}
 
function buildTicker(){
  const inner=document.getElementById('ticker');
  const items=CUR.map(c=>{
    const r=latest[c.code],p=prev[c.code],chg=r&&p?(r-p)/p*100:0;
    return `<span class="tk-item"><span class="tk-code">${c.flag} ${c.code}/MYR</span><span style="color:var(--text)">${r?r.toFixed(6):'—'}</span><span class="tk-chg ${chg>=0?'up':'dn'}">${r&&p?(chg>=0?'▲':'▼')+Math.abs(chg).toFixed(4)+'%':'—'}</span></span>`;
  }).join('');
  inner.innerHTML=items+items;
}
 
function buildHeader(){
  const hs=document.getElementById('hstats');
  hs.innerHTML=['USD','EUR','SGD'].map(code=>{
    const r=latest[code],p=prev[code],chg=r&&p?(r-p)/p*100:0;
    return `<div class="hst"><div class="hst-v" style="color:${chg>=0?'var(--green)':'var(--red)'}">${r?r.toFixed(4):'—'}</div><div class="hst-l">${code}/MYR</div></div>`;
  }).join('');
}
 
// ─── CLOCK & LIVE ─────────────────────────────────
function tick(){ document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-MY',{hour12:false})+' MYT'; }
 
function startLive(){
  setInterval(()=>{
    simTick();
    pushLiveTick(latest);
    buildTicker(); buildHeader();
  },5000);
 
  setInterval(async()=>{
    rSec--;
    document.getElementById('cdown').textContent=`REFRESH IN ${rSec}s`;
    if(rSec<=0){
      rSec=60;
      await fetchLatest();
      buildSidebar(); buildTicker(); buildHeader();
      if(ri!==0) await buildChart();
      document.getElementById('sbUpd').textContent='UPDATED: '+new Date().toLocaleTimeString('en-MY',{hour12:false});
    }
  },1000);
}
 
window.addEventListener('resize',()=>renderNews());
 
// ─── INIT ─────────────────────────────────────────
async function init(){
  const msg=document.getElementById('ldMsg');
  msg.textContent='FETCHING LIVE RATES...';
  await fetchLatest();
  msg.textContent='LOADING HISTORY...';
  await loadHist(14);
  msg.textContent='FETCHING NEWS...';
  fetchNews();
  msg.textContent='BUILDING TERMINAL...';
  buildRangebar();
  buildSidebar();
  buildTicker();
  buildHeader();
  await buildChart();
  setInterval(tick,1000); tick();
  startLive();
  document.getElementById('sbUpd').textContent='UPDATED: '+new Date().toLocaleTimeString('en-MY',{hour12:false});
  const ld=document.getElementById('loading');
  ld.style.opacity='0';
  setTimeout(()=>ld.style.display='none',500);
}
 
init();
</script>
</body>
